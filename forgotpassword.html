<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HoopStart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Forgot Password</h1>
        <form class="auth-form">
            <label>
                Email or Mobile Number
                <input type="text" name="email_phone" placeholder="Enter your email or mobile" required>
            </label>
            <button type="button" class="auth-btn">Send Code</button>
            <label>
                Confirmation Code
                <input type="text" name="code" placeholder="Enter confirmation code" required>
            </label>
            <label>
                New Password
                <input type="password" name="new_password" placeholder="Enter new password" required>
            </label>
            <label>
                Confirm Password
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </label>
            <button type="submit" class="auth-btn">Change Password</button>
            <p class="auth-link"><a href="signin.html" style="color: #ccc; text-decoration: none;">Sign in</a></p>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
